<!-- EKLENECEK OYUNLARIN KAPSARI -->
<div class="ek-oyunlar" style="font-family: system-ui, 'Segoe UI', sans-serif; max-width: 1200px; margin: 40px auto; padding: 20px; border-top: 3px dashed #ffb7c5; background: #fff9fb; border-radius: 32px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
  
  <h2 style="text-align: center; color: #e34262; margin-bottom: 30px;">✨ Sürpriz Mini Oyunlar ✨</h2>
  
  <div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;">
    
    <!-- ------ OYUN 1 : KALP YAKALAMA ------ -->
    <div style="flex: 1; min-width: 280px; background: white; border-radius: 48px; padding: 20px; box-shadow: 0 8px 20px rgba(233, 30, 99, 0.15); text-align: center;">
      <h3 style="color:#c2185b;">❤️ Kalp Yakalama ❤️</h3>
      <p style="font-size:14px; color:#a55;">Kayan kalpleri yakala, puan topla!</p>
      <div style="position: relative; height: 350px; background: #ffeef4; border-radius: 40px; overflow: hidden; margin: 15px 0; cursor: pointer; box-shadow: inset 0 0 0 2px #ffcddc, 0 4px 12px rgba(0,0,0,0.1);" id="oyunAlani">
        <div id="skorBoard" style="position: absolute; top: 15px; left: 20px; background: #e34262; color: white; padding: 5px 16px; border-radius: 40px; font-weight: bold; z-index: 10;">❤️ Skor: 0</div>
        <div id="zamanBoard" style="position: absolute; top: 15px; right: 20px; background: #333; color: #ffd; padding: 5px 16px; border-radius: 40px; font-weight: bold; z-index: 10;">⏱️ 30</div>
      </div>
      <button id="oyunBaslatBtn" style="background:#e34262; border:none; color:white; font-size:1rem; padding:8px 24px; border-radius:60px; margin-top:8px; cursor:pointer; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.2);">🎮 Başlat / Yeniden Başlat</button>
      <p style="font-size:12px; margin-top:12px;">💡 İpucu: Kalplere tıkla ya da dokun!</p>
    </div>
    
    <!-- ------ OYUN 2 : KALBİN EŞİNİ BUL (EŞLEŞTİRME) ------ -->
    <div style="flex: 1; min-width: 320px; background: white; border-radius: 48px; padding: 20px; box-shadow: 0 8px 20px rgba(233, 30, 99, 0.15); text-align: center;">
      <h3 style="color:#c2185b;">💞 Kalbin Eşini Bul 💞</h3>
      <p style="font-size:14px; color:#a55;">Aynı kalp çiftlerini eşleştir!</p>
      <div id="kartGrid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 380px; margin: 20px auto; justify-items: center;">
        <!-- kartlar js ile doldurulacak -->
      </div>
      <button id="kartlariKaristirBtn" style="background:#f3a683; border:none; color:white; font-size:1rem; padding:8px 24px; border-radius:60px; cursor:pointer; font-weight:bold; margin-top:5px;">🃏 Kartları Karıştır</button>
      <div id="eslesmeDurumu" style="margin-top: 12px; font-weight: bold; color: #e34262;"></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- KALP YAKALAMA OYUNU -----
    let aktifOyun = false;
    let skor = 0;
    let sure = 30;
    let kalpId = 0;
    let kalpler = [];
    let zamanlayiciInterval = null;
    let kalpUretimInterval = null;
    
    const oyunAlani = document.getElementById('oyunAlani');
    const skorBoard = document.getElementById('skorBoard');
    const zamanBoard = document.getElementById('zamanBoard');
    const baslatBtn = document.getElementById('oyunBaslatBtn');
    
    function oyunuDurdurVeTemizle() {
      if (zamanlayiciInterval) clearInterval(zamanlayiciInterval);
      if (kalpUretimInterval) clearInterval(kalpUretimInterval);
      for (let k of kalpler) {
        if (k && k.element) k.element.remove();
      }
      kalpler = [];
      aktifOyun = false;
    }
    
    function kalpOlustur() {
      if (!aktifOyun) return;
      const kalp = document.createElement('div');
      kalp.innerText = '❤️';
      kalp.style.position = 'absolute';
      kalp.style.fontSize = '32px';
      kalp.style.cursor = 'pointer';
      kalp.style.userSelect = 'none';
      kalp.style.transition = 'all 0.05s linear';
      const maxX = oyunAlani.clientWidth - 50;
      const maxY = oyunAlani.clientHeight - 50;
      const left = Math.max(10, Math.random() * maxX);
      kalp.style.left = left + 'px';
      kalp.style.top = '-40px';
      kalp.style.opacity = '0.9';
      kalp.style.filter = 'drop-shadow(0 2px 4px rgba(0,0,0,0.2))';
      kalp.style.zIndex = 20;
      const hiz = 1 + Math.random() * 3.5; // düşme hızı px/frame
      const id = kalpId++;
      const obj = { element: kalp, y: -40, hiz: hiz, id: id };
      kalpler.push(obj);
      oyunAlani.appendChild(kalp);
      
      kalp.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!aktifOyun) return;
        // yakalama
        skor++;
        skorBoard.innerText = `❤️ Skor: ${skor}`;
        // kalp patlama efekti gibi
        kalp.style.transform = 'scale(1.5)';
        kalp.style.opacity = '0';
        setTimeout(() => {
          if (kalp.parentNode) kalp.remove();
        }, 50);
        // listeden kaldır
        const index = kalpler.findIndex(k => k.id === id);
        if (index !== -1) kalpler.splice(index, 1);
      });
      
      // animasyon başlat (requestAnimationFrame ile hareket)
      function dusur() {
        if (!aktifOyun) return;
        const idx = kalpler.findIndex(k => k.id === id);
        if (idx === -1) return; // silinmiş
        const item = kalpler[idx];
        item.y += item.hiz;
        if (item.y > oyunAlani.clientHeight - 40) {
          // kaçtı -> can kaybı yok sadece kalp kaybolur
          if (item.element && item.element.parentNode) item.element.remove();
          kalpler.splice(idx,1);
          return;
        }
        if (item.element) item.element.style.top = item.y + 'px';
        requestAnimationFrame(() => dusur());
      }
      requestAnimationFrame(dusur);
    }
    
    function sureSayaci() {
      if (!aktifOyun) return;
      sure--;
      zamanBoard.innerText = `⏱️ ${sure}`;
      if (sure <= 0) {
        // oyun bitti
        oyunuDurdurVeTemizle();
        aktifOyun = false;
        zamanBoard.innerText = `⏱️ 0`;
        alert(`Oyun Bitti! Toplam puanın: ${skor} ❤️`);
        baslatBtn.innerText = '🎮 Tekrar Oyna';
      }
    }
    
    function oyunuBaslat() {
      oyunuDurdurVeTemizle();
      skor = 0;
      sure = 30;
      skorBoard.innerText = `❤️ Skor: 0`;
      zamanBoard.innerText = `⏱️ 30`;
      aktifOyun = true;
      if (zamanlayiciInterval) clearInterval(zamanlayiciInterval);
      if (kalpUretimInterval) clearInterval(kalpUretimInterval);
      zamanlayiciInterval = setInterval(() => sureSayaci(), 1000);
      kalpUretimInterval = setInterval(() => { if(aktifOyun) kalpOlustur(); }, 600);
      // başlangıçta birkaç kalp
      for(let i=0;i<3;i++) setTimeout(()=> kalpOlustur(), i*200);
      baslatBtn.innerText = '🎮 Oynanıyor...';
    }
    
    baslatBtn.addEventListener('click', () => {
      oyunuBaslat();
    });
    
    // ----- KALBİN EŞİNİ BUL (EŞLEŞTİRME) -----
    const kartIkonlari = ['❤️', '💖', '💗', '💓', '💘', '💝', '💟', '❣️'];
    let kartlar = [];
    let acikKartlar = [];
    let kilitli = false;
    let eslesmeSayisi = 0;
    const gridEl = document.getElementById('kartGrid');
    const eslesmeDurumuEl = document.getElementById('eslesmeDurumu');
    const karistirBtn = document.getElementById('kartlariKaristirBtn');
    
    function karistirArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function yeniKartDizisi() {
      // 4 çift seç (toplam 8 kart)
      let secilenIkonlar = [...kartIkonlari.slice(0,4), ...kartIkonlari.slice(0,4)];
      return karistirArray(secilenIkonlar);
    }
    
    function kartOlustur(ikon, index) {
      const kart = document.createElement('div');
      kart.className = 'kart';
      kart.style.width = '70px';
      kart.style.height = '90px';
      kart.style.backgroundColor = '#ffe0e7';
      kart.style.borderRadius = '20px';
      kart.style.display = 'flex';
      kart.style.alignItems = 'center';
      kart.style.justifyContent = 'center';
      kart.style.fontSize = '38px';
      kart.style.boxShadow = '0 6px 0 #b9848f';
      kart.style.cursor = 'pointer';
      kart.style.transition = '0.2s';
      kart.style.userSelect = 'none';
      kart.style.backfaceVisibility = 'hidden';
      kart.setAttribute('data-icon', ikon);
      kart.setAttribute('data-index', index);
      kart.setAttribute('data-eslesti', 'false');
      
      // kapalı yüz
      const inner = document.createElement('span');
      inner.innerText = '?';
      inner.style.fontSize = '42px';
      inner.style.fontWeight = 'bold';
      inner.style.color = '#e34262';
      kart.appendChild(inner);
      
      let acik = false;
      kart.addEventListener('click', () => {
        if (kilitli) return;
        if (acik) return;
        if (kart.getAttribute('data-eslesti') === 'true') return;
        // kartı aç
        inner.innerText = ikon;
        inner.style.fontSize = '48px';
        acik = true;
        acikKartlar.push({ kart, ikon, index });
        if (acikKartlar.length === 2) {
          kilitli = true;
          setTimeout(() => kontrolEt(), 400);
        }
      });
      
      // yeniden kapatma fonksiyonu
      const kapat = () => {
        if (kart.getAttribute('data-eslesti') === 'true') return;
        inner.innerText = '?';
        inner.style.fontSize = '42px';
        acik = false;
      };
      kart.kapat = kapat;
      return kart;
    }
    
    function kontrolEt() {
      const [kart1, kart2] = acikKartlar;
      if (kart1.ikon === kart2.ikon) {
        // eşleşti
        kart1.kart.setAttribute('data-eslesti', 'true');
        kart2.kart.setAttribute('data-eslesti', 'true');
        kart1.kart.style.background = '#d4f1f9';
        kart2.kart.style.background = '#d4f1f9';
        kart1.kart.style.opacity = '0.7';
        kart2.kart.style.opacity = '0.7';
        eslesmeSayisi++;
        eslesmeDurumuEl.innerText = `💕 Eşleşme: ${eslesmeSayisi} / 4`;
        if (eslesmeSayisi === 4) {
          eslesmeDurumuEl.innerHTML = '🎉 Tüm kalpler birleşti! 🎉 <br> 💖 Muhteşemsin! 💖';
        }
        acikKartlar = [];
        kilitli = false;
      } else {
        // eşleşmedi
        setTimeout(() => {
          kart1.kart.kapat();
          kart2.kart.kapat();
          acikKartlar = [];
          kilitli = false;
        }, 200);
      }
    }
    
    function tahlayiciKartlariYenile() {
      gridEl.innerHTML = '';
      const yeniDizi = yeniKartDizisi();
      kartlar = [];
      eslesmeSayisi = 0;
      acikKartlar = [];
      kilitli = false;
      eslesmeDurumuEl.innerText = `💕 Eşleşme: 0 / 4`;
      for (let i=0; i<yeniDizi.length; i++) {
        const kart = kartOlustur(yeniDizi[i], i);
        kartlar.push(kart);
        gridEl.appendChild(kart);
      }
    }
    
    karistirBtn.addEventListener('click', () => {
      tahlayiciKartlariYenile();
    });
    
    // ilk yüklemede kartları hazırla
    tahlayiciKartlariYenile();
    
    // Sayfa yeniden boyutlandırmada kalp oyun alanı düzenini koru
    window.addEventListener('resize', () => {
      // oyun alanındaki kalplerin konumlarını korumak için ekstra bir şey yapmıyoruz, sadece oyun alanı yeniden konumlanır.
    });
    
  })();
</script>
